name: Generate OST

on:
  # Manual trigger from GitHub UI — also accepts pasted text from the web form
  workflow_dispatch:
    inputs:
      okr_text:
        description: "Paste your OKR / business outcome text (optional — overrides inputs/okr.md)"
        required: false
        default: ""
      interview_text:
        description: "Paste your user interview notes (optional — overrides inputs/interviews/)"
        required: false
        default: ""
      context_text:
        description: "Paste mission/vision/product goals (optional — overrides inputs/context/)"
        required: false
        default: ""

  # Auto-trigger when input files change
  push:
    paths:
      - "inputs/**"

# Least-privilege: read-only by default; the commit step elevates via GITHUB_TOKEN
permissions:
  contents: read

jobs:
  generate-ost:
    runs-on: ubuntu-latest
    name: Run OST Agent Pipeline

    steps:
      - name: Checkout repository
        # actions/checkout v4.2.2 — pinned to immutable commit SHA (supply-chain safety)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        # actions/setup-python v5.3.0 — pinned to immutable commit SHA
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OST Agent Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          INPUT_OKR_TEXT: ${{ github.event.inputs.okr_text }}
          INPUT_INTERVIEW_TEXT: ${{ github.event.inputs.interview_text }}
          INPUT_CONTEXT_TEXT: ${{ github.event.inputs.context_text }}
        run: python agents/orchestrator.py

      - name: Commit generated tree back to repo
        # This is the only step that needs write access; we elevate here explicitly.
        # Token injected into the remote URL only (in-memory); never written to disk.
        permissions:
          contents: write
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "OST Architect Bot"
          git config user.email "actions@github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add docs/tree_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit — tree_data.json is up to date."
          else
            git commit -m "chore: regenerate OST tree [skip ci]"
            git push
          fi

      - name: Print OST summary
        run: |
          echo "## OST Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json

          def safe(s):
              # Sanitise LLM-generated strings before writing to the Actions summary.
              # Strips newlines and pipes to prevent Markdown table injection and
              # accidental GitHub Actions runner command injection.
              return str(s).replace('|', '-').replace('\n', ' ').replace('\r', '').strip()[:120]

          with open('docs/tree_data.json') as f:
              tree = json.load(f)
          opportunities = tree.get('children', [])
          total_exp = sum(len(o.get('children', [])) for o in opportunities)
          print(f'| Field | Value |')
          print(f'|---|---|')
          print(f'| **Outcome** | {safe(tree[\"name\"])} |')
          print(f'| **Metric** | {safe(tree.get(\"meta\", {}).get(\"metric\", \"N/A\"))} |')
          print(f'| **Opportunities** | {len(opportunities)} |')
          print(f'| **Experiments** | {total_exp} |')
          print(f'| **Generated at** | {safe(tree.get(\"generated_at\", \"N/A\"))} |')
          " >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View your tree at: https://alihabbache.github.io/Opportunity-Solution-Tree-Architect/" >> $GITHUB_STEP_SUMMARY
